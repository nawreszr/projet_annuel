# Upstreams
upstream learning_portal {
    server learning-portal:3000;
}

upstream course_service {
    server course-service:8001;
}

upstream user_service {
    server user-service:8002;
}

upstream analytics_service {
    server analytics-service:8003;
}

upstream ai_tutor_service {
    server ai-tutor-service:8004;
}

upstream n8n_service {
    server n8n-automation:5678;
}

# Main server
server {
    listen 80;
    server_name localhost;
    
    # Frontend
    location / {
        proxy_pass http://learning_portal;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API Gateway Routes
    location /api/courses/ {
        proxy_pass http://course_service/api/courses/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/users/ {
        proxy_pass http://user_service/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/auth/ {
        proxy_pass http://user_service/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/analytics/ {
        proxy_pass http://analytics_service/api/analytics/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/ai/ {
        proxy_pass http://ai_tutor_service/api/ai/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/n8n/ {
        proxy_pass http://n8n_service/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # WebSocket support for n8n
    location /webhook/ {
        proxy_pass http://n8n_service/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
