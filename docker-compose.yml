services:
  # Bases de données
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: mongodb123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: learning_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Microservices
  user-service:
    build: ./user-service
    container_name: user_service
    restart: always
    ports:
      - "8002:8002"
    environment:
      MONGODB_URI: mongodb://admin:mongodb123@mongodb:27017/users?authSource=admin
      JWT_SECRET: secret123
      PORT: 8002
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./user-service:/app
      - /app/node_modules

  course-service:
    build: ./course-service
    container_name: course_service
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    volumes:
      - ./course-service:/app

  analytics-service:
    build: ./analytics-service
    container_name: analytics_service
    restart: always
    ports:
      - "8003:8003"
    depends_on:
      - postgres
    volumes:
      - ./analytics-service:/app

  ai-tutor-service:
    build: ./ai-tutor-service
    container_name: ai_tutor_service
    restart: always
    ports:
      - "8004:8004"
    environment:
      - GEMINI_API_KEY=AIzaSyDSf4BwTHZCDbjjT7JIiLBu-4RImFHsNzQ
    volumes:
      - ./ai-tutor-service:/app

  learning-portal:
    build: ./learning-portal
    container_name: learning_portal
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_USER_SERVICE_URL: http://localhost:8002/api
      NEXT_PUBLIC_COURSE_SERVICE_URL: http://localhost:8001/api
    depends_on:
      - user-service
      - course-service
    volumes:
      - ./learning-portal:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_data:
  redis_data:
  postgres_data:
  minio_data:
