apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: learning-portal
  labels:
    app: minio
spec:
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: minio-api
  - port: 9001
    targetPort: 9001
    protocol: TCP
    name: minio-console
  selector:
    app: minio
  type: ClusterIP
