apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tutor-service
  namespace: learning-portal
  labels:
    app: ai-tutor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-tutor-service
  template:
    metadata:
      labels:
        app: ai-tutor-service
    spec:
      containers:
      - name: ai-tutor-service
        image: nawreszarrouki/ai-tutor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8004
          name: http
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: global-secrets
              key: GEMINI_API_KEY
        livenessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
